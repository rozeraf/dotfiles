palette = "noctalia"
add_newline = false

format = """
$directory$git_branch$git_status$python$nix_shell$docker_context$container$cmd_duration$jobs$status
$character
"""

[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"

[username]
disabled = true

[hostname]
disabled = true

[directory]
home_symbol = "~"
read_only = " ro"
style = "bold yellow"
truncation_length = 4
truncation_symbol = ".../"
format = "[$path]($style)"

[directory.substitutions]

[git_branch]
symbol = "git:"
style = "bold magenta"
truncation_length = 20
truncation_symbol = ""
format = " [$symbol$branch]($style)"

[git_status]
style = "bold red"
conflicted = " !"
ahead = " >"
behind = " <"
diverged = " <>"
untracked = " ?"
stashed = " $"
modified = " *"
staged = " +"
renamed = " r"
deleted = " d"
format = "([$all_status]($style))"

[python]
python_binary = "python3"
format = " [py:$version(\\($virtualenv\\))]($style)"
style = "bold yellow"
detect_extensions = []
detect_files = []
detect_folders = []

[nix_shell]
heuristic = true
format = " [nix:$state( \\($name\\))]($style)"
style = "bold blue"
impure_msg = "impure"
pure_msg = "pure"
unknown_msg = "shell"

[docker_context]
only_with_files = true
format = " [docker:$context]($style)"
style = "bold blue"

[container]
format = " [ctr:$name]($style)"
style = "bold red dimmed"

[cmd_duration]
min_time = 2000
format = " [$duration](bold yellow)"
min_time_to_notify = 45000

[jobs]
symbol = "jobs:"
symbol_threshold = 1
number_threshold = 2
format = " [$symbol$number]($style)"
style = "bold blue"

[status]
disabled = false
symbol = "x"
success_symbol = ""
not_found_symbol = "nf"
not_executable_symbol = "nx"
sigint_symbol = "^C"
signal_symbol = "sig"
format = " [$symbol$status]($style)"
style = "bold red"

[package]
disabled = true

[git_commit]
disabled = true

[git_state]
format = '[\($state( $progress_current/$progress_total)\)](bold yellow) '

[line_break]
disabled = false

[time]
disabled = true

[memory_usage]
disabled = true













